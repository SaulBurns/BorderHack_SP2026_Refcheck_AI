services:
  - type: web
    name: refcheck-ai-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: AI_PROVIDER
        value: anthropic
      - key: AI_MODEL
        value: claude-sonnet-4-5
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
